<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | SecureNet AI IDS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{

            margin:0;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0F172A,#1E293B);

            font-family:'Poppins',sans-serif;

            color:white;

        }

        .error-card{

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:50px;

            text-align:center;

            width:90%;

            max-width:650px;

            box-shadow:0 15px 40px rgba(0,0,0,.4);

        }

        .error-card h1{

            font-size:120px;

            font-weight:700;

            color:#38BDF8;

        }

        .error-card h3{

            font-weight:600;

            margin-bottom:20px;

        }

        .error-card p{

            color:#CBD5E1;

            margin-bottom:30px;

        }

        .btn-home{

            background:#2563EB;

            color:white;

            padding:12px 30px;

            border-radius:10px;

            text-decoration:none;

            transition:.3s;

            font-weight:600;

        }

        .btn-home:hover{

            background:#1D4ED8;

            color:white;

        }

        .icon{

            font-size:60px;

            color:#EF4444;

            margin-bottom:20px;

        }

    </style>

</head>

<body>

<div class="error-card">

    <i class="fas fa-triangle-exclamation icon"></i>

    <h1>404</h1>

    <h3>Oops! Page Not Found</h3>

    <p>

        The page you are looking for doesn't exist,
        has been moved, or the URL is incorrect.

    </p>

    <a href="/dashboard" class="btn-home">

        <i class="fas fa-house"></i>

        Back to Dashboard

    </a>

</div>

</body>

</html>
