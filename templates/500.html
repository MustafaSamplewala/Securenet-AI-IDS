<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>500 - Internal Server Error | SecureNet AI IDS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:linear-gradient(135deg,#0f172a,#1e293b);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            color:white;

            overflow:hidden;

        }

        .container-box{

            width:90%;

            max-width:700px;

            padding:50px;

            border-radius:20px;

            text-align:center;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            box-shadow:0 15px 40px rgba(0,0,0,.4);

            animation:fadeIn .8s ease;

        }

        @keyframes fadeIn{

            from{

                opacity:0;

                transform:translateY(40px);

            }

            to{

                opacity:1;

                transform:translateY(0);

            }

        }

        .error-icon{

            font-size:80px;

            color:#f59e0b;

            margin-bottom:20px;

        }

        h1{

            font-size:110px;

            font-weight:700;

            color:#ef4444;

        }

        h2{

            margin-top:-15px;

            margin-bottom:20px;

            font-weight:600;

        }

        p{

            color:#cbd5e1;

            margin-bottom:35px;

            line-height:1.7;

        }

        .btn-dashboard{

            display:inline-block;

            padding:12px 30px;

            background:#2563eb;

            color:white;

            text-decoration:none;

            border-radius:10px;

            font-weight:600;

            transition:.3s;

        }

        .btn-dashboard:hover{

            background:#1d4ed8;

            color:white;

            transform:translateY(-2px);

        }

        .btn-home{

            display:inline-block;

            padding:12px 30px;

            background:#10b981;

            color:white;

            text-decoration:none;

            border-radius:10px;

            font-weight:600;

            margin-left:15px;

            transition:.3s;

        }

        .btn-home:hover{

            background:#059669;

            color:white;

            transform:translateY(-2px);

        }

    </style>

</head>

<body>

<div class="container-box">

    <i class="fas fa-server error-icon"></i>

    <h1>500</h1>

    <h2>Internal Server Error</h2>

    <p>

        Something went wrong while processing your request.<br>

        Please try again in a few moments.<br>

        If the problem persists, contact the administrator.

    </p>

    <a href="/dashboard" class="btn-dashboard">

        <i class="fas fa-chart-line"></i>

        Dashboard

    </a>

    <a href="/" class="btn-home">

        <i class="fas fa-house"></i>

        Home

    </a>

</div>

</body>

</html>
